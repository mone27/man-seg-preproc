[workspace]
# important pytorch needs to be after conda-forge, otherwise it will get priority and try to install old dependencies
channels = ["nvidia","conda-forge", "pytorch"]
name = "semantic-segmentation"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
pdal = ">=2.9.2,<3"
ipykernel = ">=7.1.0,<8"
pyprojroot = ">=0.3.0,<0.4"
python = "3.12.*"
requests = ">=2.32.5,<3"
laspy = ">=2.6.1,<3"
lazrs-python = ">=0.8.0,<0.9"
cuda = "12.1.*"
pytorch = {version = "==2.2.2", channel = "pytorch"}
torchvision = {version = "==0.17.2", channel = "pytorch"}
pytorch-cuda = {version = "==12.1", channel = "pytorch"}
numpy = "<2" # needed for old version of pytorch
tensorboard = ">=2.20.0,<3"
pixi-pycharm = ">=0.0.10,<0.0.11"
debugpy = ">=1.8.17,<2"

[pypi-dependencies]
open3d = ">=0.19.0, <0.20"
man_seg_preproc = { path = ".", editable = true }
pclbox = {git="https://github.com/qforestlab/leaf-wood-segmentation-with-deep-learning.git"}
# torch = { version = "~=2.2.0", index = "https://download.pytorch.org/whl/cu130" }

# see issue https://github.com/prefix-dev/pixi/discussions/2032, otherwise open3d fails to install
[system-requirements]
libc = { family = "glibc", version = "2.34" }
