[DEFAULT]
# All sections below are required unless otherwise specified.
# See https://github.com/AnswerDotAI/nbdev/blob/main/settings.ini for examples.

### Python library ###
repo = manual-segmentation-preprocessing
lib_name = man_seg_preproc
version = 0.0.1
min_python = 3.10
license = apache2
black_formatting = False

### nbdev ###
doc_path = _docs
lib_path = man_seg_preproc
nbs_path = nbs
recursive = True
tst_flags = notest
put_version_in_init = True
update_pyproject = True

### Docs ###
branch = main
custom_sidebar = False
doc_host = https://%(user)s.github.io
doc_baseurl = /%(repo)s
git_url = https://github.com/%(user)s/%(repo)s
title = %(lib_name)s

### PyPI ###
audience = Developers
author = Simone Massaro
author_email = simone.massaro@ugent.be
copyright = 2025 onwards, %(author)s
description = Preprocessing steps for manual segmentations for TLS Forest point clouds
keywords = nbdev jupyter notebook python
language = English
status = 3
user = mone27

